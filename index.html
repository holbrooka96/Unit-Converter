<!DOCTYPE html>
<head>
        <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="header">
        <h1>Metric/Imperial Unit Conversion</h1>
        <input type="number" id="input-box" placeholder="00">
        <button id="convert-btn">Convert</button>
    </div>
    <div class="divider">
        <div class="metrics">
            <h2>Length (Meter/Feet)</h2>
            <p id="length">TestA</p>
        </div>
        <div class="metrics">
            <h2>Volume (Liters/Gallons)</h2>
            <p id="volume">TestB</p>
        </div>
        <div class="metrics">
            <h2>Mass (Kilograms/Pounds)</h2>
            <p id="mass">TestC</p>
        </div>

    </div>
    <script src="index.js"></script> 
</body>
